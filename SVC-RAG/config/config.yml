# SVC-RAG: логика RAG (парсинг, чанкинг, поиск). Модели — в SVC-RAG-MODELS.

server:
  host: "0.0.0.0"
  port: 8000
  log_level: "INFO"
  docs_url: "/docs"
  redoc_url: "/redoc"

cors:
  allowed_origins: []
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

urls:
  frontend_port_1: "http://localhost:3000"
  frontend_port_1_ipv4: "http://127.0.0.1:3000"
  frontend_port_2: "http://localhost:3001"
  frontend_port_2_ipv4: "http://127.0.0.1:3001"
  frontend_port_3: "http://localhost:5173"
  frontend_port_3_ipv4: "http://127.0.0.1:5173"
  backend_port_1: "http://localhost:8000"
  backend_port_1_ipv4: "http://127.0.0.1:8000"
  backend_port_2: "http://localhost:8080"
  backend_port_2_ipv4: "http://127.0.0.1:8080"
  llm_service_port: "http://localhost:8002"
  llm_service_docker: "http://llm-service:8000"
  ocr_service_port: "http://localhost:8004"
  ocr_service_docker: "http://ocr-service:8000"
  rag_models_service_port: "http://localhost:8010"
  rag_models_service_docker: "http://rag-models:8000"
  backend_service_port: "http://localhost:8000"

# Провайдер эмбеддингов/реранкера: native (SVC-RAG-MODELS) или openai-compat (Phoenix и т.п.)
rag_models:
  provider: "native" # native / Phoenix / ...
  providers:
    - id: "Phoenix"
      kind: "openai-compat"
      # Заполните base_url / api_key_env под своё окружение при provider=Phoenix
      base_url: ""
      api_key_env: "LLM_API_KEY_PHOENIX"
      timeout: 300

app:
  title: "astrachat RAG Service"
  description: "Индексация документов и поиск (pgvector + BM25), эмбеддинги и реранкер через SVC-RAG-MODELS"
  version: "1.0.0"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# ========================================================
# ИНТЕГРАЦИИ И БАЗЫ ДАННЫХ
# ========================================================
# Если base_url пустой, подставляется из блока urls
rag_models_client:
  base_url: ""
  # Индексация DOCX/PDF: на CPU один чанк ~секунды; 60 с мало для больших документов
  timeout: 600.0
  embed_batch_size: 24

# Если base_url пустой, подставляется из блока urls
llm_service:
  base_url: ""
  timeout: 120.0
  default_model: "default"

# Если url пустой, подставляется из блока urls
ocr:
  url: ""
  timeout: 300.0

# PostgreSQL с pgvector
postgresql:
  host: "postgresql"
  port: 5432
  database: "astrachat"
  user: "admin"
  password: "password"
  embedding_dim: 384

# MinIO хранится в backend, но секция нужна для единообразного конфига RAG
# и метаданных по объектам (bucket/object), которые приходят в API.
minio:
  endpoint: "minio"
  port: 9000
  access_key: "minioadmin"
  secret_key: "minioadmin"
  use_ssl: false
  bucket_name: "astrachat-temp"
  documents_bucket_name: "astrachat-documents"

# Параметры поиска
rag:
  enabled: true

  # --- Гибридный поиск (BM25 + вектор через weighted RRF) ---
  use_hybrid_search: true
  hybrid_bm25_weight: 0.35
  # Отдельная диверсификация после RRF. Не зависит от cosine-порогов:
  # сначала сохраняет не более N чанков одного документа, при нехватке
  # кандидатов ослабляет лимит, чтобы вернуть запрошенный top-k.
  hybrid_diversify_results: true
  hybrid_max_chunks_per_document: 2
  # Максимум чанков одного документа в выдаче чистого vector-поиска (0 = выкл).
  vector_max_chunks_per_document: 6

  # --- Реранкинг (cross-encoder через SVC-RAG-MODELS) ---
  use_reranking: true
  rerank_top_k: 40
  # Минимальный скор после реранка (0 = не отсекать; формула: 0.7*CrossEncoder + 0.3*cosine).
  rerank_min_score: 0

  # --- Минимальное косинусное сходство до реранка ---
  min_vector_similarity: 0.05
  # Порог минимальной длины чанка для «low_signal»-фильтра. 0 = не фильтровать вовсе.
  min_chunk_length: 40

  # --- Чанкинг ---
  chunk_size: 1000
  chunk_overlap: 250

  # --- Sentence window (расширение найденного чанка соседями) ---
  sentence_window: 0

  # --- Иерархическое индексирование (только global store) ---
  use_hierarchical_indexing: true
  hierarchical_threshold: 8000
  hierarchical_chunk_size: 1500
  hierarchical_chunk_overlap: 200
  intermediate_summary_chunks: 8
  # Суммаризировать документ через LLM при индексации (требует работающего llm-service).
  create_full_summary_via_llm: false

  # --- Graph RAG ---
  enable_graph_rag: true
  eval_llm_judge_allowed: true
