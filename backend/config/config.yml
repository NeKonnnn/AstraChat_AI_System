  rag_models_service_docker: "http://rag-models:8000"

  # MCP Atlassian (8012 — 8011 занят svc-rag)
  mcp_atlassian_service_port: "http://localhost:8012"
  mcp_atlassian_service_docker: "http://mcp-atlassian:8000"
