# Конфигурация astrachat Backend
# Теперь каждая модель вынесена в отдельный изолированный микросервис
#
# Сетевые URL задаются только в секции urls: ниже. Поля microservices.*.url не используются
# (удалены); таймауты и прочие параметры — в microservices.

# Основные настройки приложения
app:
  name: "astrachat Backend"
  version: "1.0.0"
  description: "Backend service with distributed AI microservices"
  debug: false

# Настройки сервера
server:
  host: "0.0.0.0"
  port: 8000
  log_level: "INFO"
  workers: 1

# CORS: пустой список — origins берутся из urls (frontend_*, backend_*)
cors:
  allowed_origins: []
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

# Аутентификация: блокировка после серии неверных паролей
# AUTH_SESSION_TIMEOUT_SECONDS — в .env (0 = отключено, для локальной разработки)
auth:
  login_lockout:
    enabled: true
    max_failed_attempts: 5
    lockout_duration_seconds: 900

# ========================================================
# MCP PLATFORM (универсальная интеграция MCP-серверов)
# ========================================================
mcp:
  enabled: true
  tools_cache_ttl_seconds: 60
  pool:
    max_size: 4
    idle_ttl_seconds: 120
    acquire_timeout_seconds: 5
  servers:
    - id: atlassian
      display_name: "Jira / Confluence"
      enabled: false
      transport: streamable-http
      base_url: ""
      base_path: /mcp
      health_path: /healthz
      stateless: true
      timeout_seconds: 120
      credential_provider: atlassian
      tool_name_prefix: mcp_atlassian_
      auth_mode: service_account
      auth_type: none
  forward_headers:
    enabled: true
    user:
      username: "X-GPB-Ldap-User"
      user_id: "X-GPB-User-Id"
      email: "X-GPB-User-Email"
    chat_id_header: "X-OpenWebUI-Chat-Id"
    message_id_header: "X-OpenWebUI-Message-Id"

# ========================================================
# НАСТРОЙКИ МИКРОСЕРВИСОВ (ML Services)
# ========================================================
microservices:
  llm:
    enabled: true
    timeout: 300
    default_host_id: "local"
    hosts:
      - id: local
        # base_url подставляется из urls.llm_service_docker / llm_service_port при загрузке, если пусто
        base_url: ""
    models:
      default: "Qwen3.5-4B-UD-Q8_K_XL"
      fallback: "Qwen3-Coder-30B-A3B-Instruct-Q8_0"

  stt:
    enabled: true
    timeout: 900
    whisperx:
      enabled: true
      compute_type: "int8"

  tts:
    enabled: true
    timeout: 300

  diarization:
    enabled: true
    timeout: 3600

  ocr:
    enabled: true
    timeout: 300

# ========================================================
# ПАМЯТЬ И БАЗЫ ДАННЫХ
# ========================================================
memory:
  enabled: true
  storage_type: "file"
  file_path: "/app/memory"
  max_history_length: 100

mongodb:
  host: "mongodb"
  port: 27017
  database: "astrachat"
  user: "admin"
  password: "password"

postgresql:
  host: "postgresql"
  port: 5432
  database: "astrachat"
  user: "admin"
  password: "password"
  embedding_dim: 384

minio:
  endpoint: "minio"
  port: 9000
  access_key: "minioadmin"
  secret_key: "minioadmin"
  use_ssl: false
  bucket_name: "memoai-temp"
  documents_bucket_name: "astrachat-documents"

# ========================================================
# ГЕНЕРАЦИЯ ИЗОБРАЖЕНИЙ (ComfyUI, как Open WebUI)
# В Docker: сервис comfyui в docker-compose, URL бэкенда: http://comfyui:8188 (см. IMAGE_GEN_COMFYUI_URL).
# Локально: python main.py --listen 0.0.0.0 --port 8188
# Ноды: ComfyUI-GGUF (Unet Loader), workflow экспорт «Save (API Format)».
# node_map — id нод из JSON (строками): куда подставить prompt / width / height / steps / seed.
# Пример: prompt.node / prompt.input, width.node для KSampler или EmptyLatentImage и т.д. — см. свой API JSON.
# При необходимости задайте IMAGE_GEN_* в .env (см. ImageGenerationConfig в backend/settings/config.py).
# ========================================================
image_generation:
  enabled: true
  comfyui_base_url: "http://127.0.0.1:8188"
  # Путь от каталога backend/ (в Docker: /app). Положите checkpoint в models/comfyui/checkpoints/
  workflow_path: "config/comfy_workflows/sd15_txt2img_api.json"
  request_timeout_sec: 900
  poll_interval_sec: 1.0
  chat_triggers_enabled: true
  default_width: 512
  default_height: 512
  default_steps: 20
  # Пусто = имя из workflow или первый checkpoint, который видит ComfyUI
  checkpoint_name: ""
  node_map:
    prompt:
      node: "6"
      input: "text"
    width:
      node: "5"
      input: "width"
    height:
      node: "5"
      input: "height"
    steps:
      node: "3"
      input: "steps"
    seed:
      node: "3"
      input: "seed"

# ========================================================
# ПУТИ И СИСТЕМНЫЕ НАСТРОЙКИ
# ========================================================
paths:
  whisperx_models_dir: "whisperx_models"
  diarize_models_dir: "diarize_models"
  model_path: "models"
  memory_path: "memory"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "/app/logs/backend.log"
  max_size: 10485760
  backup_count: 5


urls:
  # Legacy aliases (для совместимости со старым кодом/интеграциями)
  frontend_port: "http://localhost:3000"
  frontend_port_ipv4: "http://127.0.0.1:3000"
  backend_port: "http://localhost:8000"
  backend_port_ipv4: "http://127.0.0.1:8000"
  ingress_port: "http://localhost:8000"

  frontend_port_1: "http://localhost:3000"
  frontend_port_1_ipv4: "http://127.0.0.1:3000"
  frontend_port_2: "http://localhost:3001"
  frontend_port_2_ipv4: "http://127.0.0.1:3001"
  frontend_port_3: "http://localhost:5173"
  frontend_port_3_ipv4: "http://127.0.0.1:5173"

  backend_port_1: "http://localhost:8000"
  backend_port_1_ipv4: "http://127.0.0.1:8000"
  backend_port_2: "http://localhost:8080"
  backend_port_2_ipv4: "http://127.0.0.1:8080"

  frontend_docker: "http://astrachat-frontend:3000"
  backend_docker: "http://astrachat-backend:8000"

  llm_service_port: "http://localhost:8002"
  llm_service_docker: "http://llm-service:8000"

  stt_service_port: "http://localhost:8001"
  stt_service_docker: "http://stt-service:8000"

  tts_service_port: "http://localhost:8005"
  tts_service_docker: "http://tts-service:8000"

  ocr_service_port: "http://localhost:8004"
  ocr_service_docker: "http://ocr-service:8000"

