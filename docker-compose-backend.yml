services:
  # Backend - FastAPI 
  astrachat-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./memory:/app/memory
      - ./uploads:/app/uploads
      - ./backend:/app # Монтирование для разработки, чтобы не пересобирать образ
      - ./models:/app/models:ro # Для RAG-системы (эмбеддинги)
    env_file:
      - ./backend/.env # Подхватываем .env из папки бэкенда
    environment:
      - USE_LLM_SVC=true # Включаем режим работы через сервисы
      - SVC_LLM_URL=http://llm-service:8000
      - SVC_STT_URL=http://stt-service:8000
      - SVC_TTS_URL=http://tts-service:8000
      - SVC_OCR_URL=http://ocr-service:8000
      - SVC_DIARIZATION_URL=http://diarization-service:8000
      
      - DOCKER_ENV=true
      - PYTHONPATH=/app
      
      # MongoDB
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      # PostgreSQL
      - POSTGRES_HOST=postgresql
      - POSTGRES_PORT=5432
      # MinIO
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
    depends_on:
      # Ждем, пока запустятся все наши зависимости
      mongodb: { condition: service_healthy }
      postgresql: { condition: service_healthy }
      minio: { condition: service_healthy }
      llm-service: { condition: service_started } # Ждем хотя бы старта, так как модель грузится долго
      tts-service: { condition: service_started }
      stt-service: { condition: service_started }
      ocr-service: { condition: service_started }
      diarization-service: { condition: service_started }
    restart: unless-stopped
    networks:
      - astrachat-network

  # --- БАЗЫ ДАННЫХ И NGINX ---

  mongodb:
    image: mongo:7
    container_name: astrachat-mongodb
    ports: ["27017:27017"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-password}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - astrachat-network

  postgresql:
    image: pgvector/pgvector:pg17
    container_name: astrachat-postgresql
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-astrachat}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-astrachat}"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - astrachat-network

  minio:
    image: minio/minio:latest
    container_name: astrachat-minio
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - astrachat-network

  nginx:
    image: nginx:alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - astrachat-backend
      # - astrachat-frontend 
    restart: unless-stopped
    networks:
      - astrachat-network
    profiles:
      - production

volumes:
  mongodb_data:
  postgresql_data:
  minio_data:

networks:
  astrachat-network:
    driver: bridge