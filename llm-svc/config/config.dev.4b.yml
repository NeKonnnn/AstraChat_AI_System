# Конфигурация сервера
server:
  host: "0.0.0.0"
  port: 8080
  log_level: "DEBUG"
  docs_url: "/docs"
  redoc_url: "/redoc"
# Настройки CORS
cors:
  allowed_origins:
    - "http://localhost:3080"
    - "http://localhost:8080"
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]
# Настройки модели LLM
model:
  name: "Qwen3-4B-Instruct-2507-Q8"
  path: "/app/models/Qwen3-4B-Instruct-2507-Q8_0.gguf"
  #chat_format: "chatml-function-calling"
  #chat_template_path: "/app/app/services/chat-format-template/qwen3_chat_format_template.jinja"
  #ctx_size: 4096
  #ctx_size: 65536
  ctx_size: 16384
  gpu_layers: 0
  #verbose: false
  verbose: True
  pool_size: 2  # Размер пула моделей
  n_thread: 12  # Количество потоков для CPU
  n_threads_batch: 12  # Количество потоков для батчей
  n_batch: 512  # Размер батча
  n_ubatch: 512  # Размер микро-батча
# Настройки генерации
generation:
  default_temperature: 0.7
  default_max_tokens: 512
  stream: false
  #stream: true
# Настройки приложения
app:
  title: "Llama CPP API Service"
  description: "API service for Llama-based models compatible with OpenAI API"
  version: "1.0.0"
# Настройки метрик и мониторинга
monitoring:
  enabled: false
  prometheus_port: 9090
  metrics_path: "/metrics"
# Настройки логирования
logging:
  level: "DEBUG"
  format: "%(asctime)s,%(msecs)03d: [%(levelname)s][%(name)s:%(funcName)s(%(lineno)d)]: %(message)s"
  file: null  # Если указано, логи будут записываться в файл
  max_size: 10485760  # 10MB
  backup_count: 5
# Настройки кэширования
caching:
  enabled: true
  ttl: 300  # Время жизни кэша в секундах
  max_size: 1000  # Максимальное количество элементов в кэше
# Настройки безопасности
security:
  enabled: false  # Включить/выключить аутентификацию по API ключу
  api_key: null  # API ключ для аутентификации (если null, аутентификация отключена)
  api_key_header: "X-API-Key"  # Название заголовка для API ключа
# Настройки Nexus
nexus:
  enabled: true  # Включить/выключить загрузку моделей из Nexus
  url: "https://nexus-cd.int.gazprombank.ru/repository/ndp-raw-test/dsur/dmkfr/model-weights/qwen3/4b/distill/Qwen3-4B-Instruct-2507-Q8_0.gguf"  # URL файла Nexus
