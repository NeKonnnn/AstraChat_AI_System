upstream astra_chat_backend {
    server astra-chat-backend:8000;
}

server {
    listen 3000;
    server_name localhost;
    
    # Максимальный размер загружаемого файла (5GB)
    client_max_body_size 5G;
    
    root /usr/share/nginx/html;
    index index.html index.htm;
    
    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    
    # Заголовки безопасности
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    
    # React Router (SPA) поддержка
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Кэширование статических ресурсов
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API / WebSocket → backend Service ClusterIP (проброс client IP/proto для CEF)
    location /api/ {
        proxy_pass http://astra_chat_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    location /socket.io/ {
        proxy_pass http://astra_chat_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_buffering off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 86400;
    }
    
    location /ws/ {
        proxy_pass http://astra_chat_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # Логи
    access_log /var/log/nginx/astrachat_access.log;
    error_log /var/log/nginx/astrachat_error.log;
}
