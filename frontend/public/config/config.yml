# Конфигурация astrachat Frontend
# ключи (frontend_port, backend_port, …) + legacy aliases (frontend_port_1, …)

app:
  name: "astrachat Frontend"
  version: "1.0.0"
  description: "Frontend service for astrachat"

urls:
  # Обязательные ключи (frontend/src/settings/config.ts)
  frontend_port: "http://localhost:3000"
  backend_port: "http://localhost:8000"
  ingress_port: "http://localhost:8000"
  llm_service_port: "http://localhost:8002"

  # Legacy aliases
  frontend_port_1: "http://localhost:3000"
  frontend_port_1_ipv4: "http://127.0.0.1:3000"
  frontend_port_2: "http://localhost:3001"
  frontend_port_2_ipv4: "http://127.0.0.1:3001"
  frontend_port_3: "http://localhost:5173"
  frontend_port_3_ipv4: "http://127.0.0.1:5173"

  backend_port_1: "http://localhost:8000"
  backend_port_1_ipv4: "http://127.0.0.1:8000"
  backend_port_2: "http://localhost:8080"
  backend_port_2_ipv4: "http://127.0.0.1:8080"

api:
  timeout: 30000
  retryEnabled: true
  retryAttempts: 3
  retryDelay: 1000

websocket:
  timeout: 10000
  pingInterval: 30000
  pingTimeout: 10000
  reconnectionAttempts: 10
  reconnectionDelay: 1000
  reconnectionDelayMax: 5000
